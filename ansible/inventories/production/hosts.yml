---
# Production = the OpenStack VM (frozen infra layer, provisioned via Terraform).
# The real IP is injected via environment variables — never committed (risk R6).
#   set -a; source .env; set +a
#   ansible-playbook -i inventories/production/hosts.yml site.yml
all:
  children:
    openedx:
      hosts:
        openedx-prod:
          ansible_host: "{{ lookup('env', 'OPENEDX_VM_HOST') }}"
          ansible_user: "{{ lookup('env', 'OPENEDX_VM_USER') | default('ubuntu', true) }}"
          ansible_ssh_private_key_file: "{{ lookup('env', 'OPENEDX_SSH_KEY') | default('~/.ssh/openedx_stage_ed25519', true) }}"
          ansible_ssh_common_args: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
