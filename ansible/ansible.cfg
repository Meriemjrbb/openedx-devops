[defaults]
inventory = inventories/production/hosts.yml
roles_path = roles
interpreter_python = auto_silent
host_key_checking = False
retry_files_enabled = False
forks = 5
timeout = 30

[callback_default]
result_format = yaml

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
become = True
become_method = sudo
