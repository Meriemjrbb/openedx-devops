---
# WP-02 — Docker from the official repository (GPG-verified), hardened.
# Note: the manual install used get.docker.com (see docs/journal.md), which
# configures the same official apt repo — this role converges to the WBS spec.

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-debian
    state: present

# The manual install (get.docker.com) left a legacy single-line docker.list.
# Remove it before adding the modern deb822 format to avoid duplicates.
- name: Remove legacy Docker apt repository (single-line format)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent

# The VM has documented intermittent DNS/TCP issues (docs/journal.md).
# Check whether the repo is already in place before reaching out to
# download.docker.com — keeps the role idempotent without requiring
# a working Internet connection on every run.
- name: Check if Docker repo is already configured
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/docker.sources
  register: docker_repo_stat

- name: Add Docker official apt repository (GPG-verified, deb822)
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }}"
    signed_by: "{{ docker_apt_key_url }}"
  register: docker_repo_result
  retries: 3
  delay: 10
  until: docker_repo_result is success
  when: not docker_repo_stat.stat.exists

- name: Install Docker Engine and plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Harden Docker daemon (log rotation, live-restore)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_options | to_nice_json }}\n"
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Allow non-root docker usage for deploy users
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Verify Docker works (docker info)
  ansible.builtin.command: docker info --format '{{ "{{" }}.ServerVersion{{ "}}" }}'
  register: docker_verify
  changed_when: false

- name: Report Docker version
  ansible.builtin.debug:
    msg: "Docker Engine {{ docker_verify.stdout }} operational"
