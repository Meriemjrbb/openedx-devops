---
# WP-02 — Docker from the official repository (GPG-verified), hardened.
# Note: the manual install used get.docker.com (see docs/journal.md), which
# configures the same official apt repo — this role converges to the WBS spec.

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-debian
    state: present

# Retries: the VM has documented intermittent DNS/TCP issues
# (docs/journal.md, OpenStack NAT/Neutron suspicion).
- name: Add Docker official apt repository (GPG-verified, deb822)
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }}"
    signed_by: "{{ docker_apt_key_url }}"
  register: docker_repo_result
  retries: 3
  delay: 10
  until: docker_repo_result is success

- name: Install Docker Engine and plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Harden Docker daemon (log rotation, live-restore)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_options | to_nice_json }}\n"
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Allow non-root docker usage for deploy users
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Verify Docker works (docker info)
  ansible.builtin.command: docker info --format '{{ "{{" }}.ServerVersion{{ "}}" }}'
  register: docker_verify
  changed_when: false

- name: Report Docker version
  ansible.builtin.debug:
    msg: "Docker Engine {{ docker_verify.stdout }} operational"
