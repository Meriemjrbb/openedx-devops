---
# WP-02 — Docker Engine from the official repository (GPG-verified).
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_apt_key_url: https://download.docker.com/linux/ubuntu/gpg

# Users allowed to run docker without sudo (non-root usage, WP-02).
docker_users:
  - "{{ ansible_user }}"

# daemon.json hardening: log rotation + live-restore + registry mirror.
# mirror.gcr.io mitigates OpenStack NAT/TCP issues hitting Docker Hub directly.
docker_daemon_options:
  log-driver: json-file
  log-opts:
    max-size: 10m
    max-file: "3"
  live-restore: true
  registry-mirrors:
    - https://mirror.gcr.io
