---
# Full Open edX deployment — encodes WP-01 → WP-05 exactly as done by hand.
# Usage:
#   ansible-playbook site.yml                                   # local inventory (default)
#   ansible-playbook -i inventories/production/hosts.yml site.yml
#
# Definition of Done: a second run must report changed=0 (idempotence).
- name: Deploy Open edX platform
  hosts: openedx
  become: true

  roles:
    - role: vm_prep # WP-01 — updates, timezone, base deps
      tags: [vm_prep, wp01]
    - role: security # WP-01 — UFW + Fail2Ban
      tags: [security, wp01]
    - role: docker # WP-02 — Docker from official repo, hardened
      tags: [docker, wp02]
    - role: tutor # WP-03 — Tutor via pipx, config
      tags: [tutor, wp03]
    - role: openedx # WP-04/05 — launch platform, admin account
      tags: [openedx, wp04, wp05]
