---
# WP-06 — CI quality gate: lint Ansible on every push/PR.
# The deployment workflow lives in deploy.yml (WP-08).
name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v25
        with:
          working_directory: ansible
